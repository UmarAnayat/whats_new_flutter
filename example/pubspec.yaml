name: whats_new_flutter_example
description: Example app for the whats_new_flutter package.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  whats_new_flutter:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: assets/icon/app_icon.png
  image_path: assets/icon/app_icon.png
  image_path_ios_dark_transparent: assets/icon/app_icon_transparent_dark.png
  adaptive_icon_background: "#1E1B4B"
  adaptive_icon_foreground: assets/icon/app_icon_transparent_dark.png
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
